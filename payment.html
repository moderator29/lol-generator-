<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Checkout · Havnora</title>
  <meta name="description" content="Reserve your home with a secure down payment or complete a full payment on Havnora." />
  <link rel="icon" type="image/svg+xml" href="assets/img/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Inter:wght@400..700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/main.css" />
  <style>
    .pay-page { padding: 32px 0 80px; max-width: 1060px; }
    .pay-grid { display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 28px; align-items: start; margin-top: 22px; }
    @media (max-width: 900px) { .pay-grid { grid-template-columns: 1fr; } }

    /* test mode ribbon */
    .test-ribbon {
      display: flex; align-items: center; gap: 10px; padding: 11px 16px;
      border-radius: 12px; border: 1px solid rgba(212, 169, 78, 0.4);
      background: var(--brass-soft); color: var(--brass-strong);
      font-size: 13.5px; font-weight: 600;
    }
    [data-theme="dark"] .test-ribbon { color: var(--brass); }
    .test-ribbon svg { width: 17px; height: 17px; flex-shrink: 0; }

    /* order summary */
    .order-media { position: relative; aspect-ratio: 16 / 8; border-radius: 12px; overflow: hidden; margin-bottom: 16px; }
    .order-media img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
    .order-rows { display: grid; gap: 0; }
    .order-row { display: flex; justify-content: space-between; gap: 14px; padding: 11px 0; border-bottom: 1px dashed var(--line); font-size: 14.5px; }
    .order-row span { color: var(--ink-2); }
    .order-row.total { border-bottom: none; padding-top: 14px; }
    .order-row.total b { font-family: var(--font-display); font-size: 26px; color: var(--brass); }

    .kind-seg { display: flex; gap: 6px; padding: 5px; border: 1px solid var(--line); border-radius: 12px; background: var(--surface-2); margin-bottom: 18px; }
    [data-theme="dark"] .kind-seg { background: rgba(255, 255, 255, 0.04); border-color: rgba(255, 255, 255, 0.1); }
    .kind-seg button { flex: 1; min-height: 44px; border-radius: 9px; font-weight: 600; font-size: 14px; color: var(--ink-2); transition: background-color 0.3s var(--ease), color 0.3s var(--ease), box-shadow 0.3s var(--ease); }
    .kind-seg button[aria-pressed="true"] { background: linear-gradient(180deg, #E4C173, #C79A3E); color: #1b1408; box-shadow: 0 4px 14px var(--glow-brass-2); }

    .method-tiles { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 4px 0 8px; }
    .method-tile {
      display: flex; flex-direction: column; gap: 3px; padding: 13px 15px; text-align: left;
      border: 1px solid var(--line); border-radius: 12px; background: var(--surface);
      transition: border-color 0.25s var(--ease), box-shadow 0.25s var(--ease);
    }
    [data-theme="dark"] .method-tile { background: rgba(255, 255, 255, 0.04); border-color: rgba(255, 255, 255, 0.1); }
    .method-tile b { font-size: 14.5px; }
    .method-tile span { font-size: 12px; color: var(--ink-3); }
    .method-tile[aria-pressed="true"] { border-color: var(--brass); box-shadow: 0 0 0 1px var(--brass) inset, 0 0 22px var(--brass-soft); }
    .method-tile[disabled] { opacity: 0.55; cursor: not-allowed; }

    .btn-pay { min-height: 54px; font-size: 16px; border-radius: 12px; }
    .secure-line { display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 12.5px; color: var(--ink-3); margin-top: 14px; }
    .secure-line svg { width: 14px; height: 14px; }

    /* processing + success states */
    .pay-state { text-align: center; padding: 46px 26px; }
    .pay-state .ring {
      width: 64px; height: 64px; margin: 0 auto 20px; border-radius: 16px;
      display: grid; place-items: center;
      background: var(--brass-soft); color: var(--brass); border: 1px solid rgba(212, 169, 78, 0.35);
      box-shadow: 0 0 34px var(--brass-soft);
    }
    .pay-state .ring svg { width: 30px; height: 30px; }
    .pay-state h2 { font-size: 26px; margin-bottom: 8px; }
    .receipt-code { display: inline-block; margin: 10px 0 4px; padding: 8px 16px; border-radius: 10px; border: 1px dashed rgba(212, 169, 78, 0.5); color: var(--brass); font-weight: 700; letter-spacing: 0.08em; }
    .spin { animation: pay-spin 0.9s linear infinite; }
    @keyframes pay-spin { to { transform: rotate(360deg); } }
    @media (prefers-reduced-motion: reduce) { .spin { animation-duration: 2s; } }
  </style>
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>

  <main id="main">
    <div class="wrap pay-page">
      <nav class="small muted" id="crumbs" aria-label="Breadcrumb" style="margin-bottom:16px"></nav>
      <div class="test-ribbon" id="mode-ribbon" hidden>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 3l9 16H3z"/><path d="M12 10v4.2M12 17.4v.2"/></svg>
        <span><b>Test mode.</b> No real money moves. Live checkout unlocks when the Stripe account is connected.</span>
      </div>
      <div id="pay-root"></div>
    </div>
  </main>

  <script src="assets/js/data.js"></script>
  <script src="assets/js/app.js"></script>
  <script src="assets/js/help.js"></script>
  <script src="assets/js/hv-api.js"></script>
  <script src="assets/js/payment.js"></script>
</body>
</html>
