<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Messages · Havnora</title>
  <meta name="description" content="Chat with the Havnora Property Manager about any listing, viewings, and down payment plans." />
  <link rel="icon" type="image/svg+xml" href="assets/img/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Inter:wght@400..700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/main.css" />
  <style>
    .sr-only {
      position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
      overflow: hidden; clip: rect(0 0 0 0); white-space: nowrap; border: 0;
    }

    /* ================= two-pane shell ================= */
    .msg-shell {
      width: min(1240px, 100% - 40px); margin-inline: auto;
      display: grid; grid-template-columns: 356px minmax(0, 1fr); gap: 18px;
      padding: 18px 0 26px;
      height: calc(100dvh - var(--nav-h));
      min-height: 480px;
    }
    .msg-shell > * { min-width: 0; }
    .msg-list, .chat {
      display: flex; flex-direction: column; min-height: 0;
      border-radius: var(--r-lg); border: 1px solid var(--line);
      overflow: hidden; box-shadow: var(--shadow-1);
    }

    /* ================= conversation list ================= */
    .ml-head {
      display: flex; justify-content: space-between; align-items: center; gap: 12px;
      padding: 16px 16px 14px; border-bottom: 1px solid var(--line);
    }
    .ml-head h1 { font-size: 20px; margin: 0; }
    .convo-list {
      list-style: none; margin: 0; padding: 10px; flex: 1; overflow-y: auto;
      display: flex; flex-direction: column; gap: 4px;
    }
    .cv-row {
      display: flex; align-items: center; gap: 12px; width: 100%;
      padding: 10px; border-radius: 12px; text-align: left;
      transition: background-color 0.2s var(--ease), box-shadow 0.25s var(--ease);
    }
    .cv-row:hover { background: var(--surface-2); }
    [data-theme="dark"] .cv-row:hover { background: rgba(255, 255, 255, 0.05); }
    .cv-row.is-active {
      background: var(--brass-soft);
      box-shadow: inset 0 0 0 1px var(--brass-soft), 0 0 18px var(--brass-soft);
    }
    .cv-thumb {
      position: relative; width: 46px; height: 46px; flex-shrink: 0;
      border-radius: 10px; overflow: hidden;
    }
    .cv-thumb img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
    .cv-thumb-brand {
      display: grid; place-items: center;
      background: linear-gradient(180deg, #E4C173, #C79A3E); color: #1b1408;
      box-shadow: 0 4px 12px var(--glow-brass-2);
    }
    .cv-thumb-brand svg { width: 26px; height: 26px; }
    .cv-main { flex: 1; min-width: 0; }
    .cv-main b {
      display: block; font-size: 14px; font-weight: 600;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .cv-prev {
      display: block; font-size: 12.5px; color: var(--ink-3);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .cv-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; flex-shrink: 0; }
    .cv-meta time { font-size: 11.5px; color: var(--ink-3); font-variant-numeric: tabular-nums; }
    .cv-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--brass); box-shadow: 0 0 8px var(--glow-brass-1);
    }
    .ml-empty { padding: 8px; }
    .ml-empty .empty { padding: 44px 14px; }

    /* ================= chat pane ================= */
    .chat-empty {
      flex: 1; display: grid; place-items: center; text-align: center;
      padding: 32px; color: var(--ink-2);
    }
    .chat-empty svg { width: 52px; height: 52px; margin: 0 auto 14px; color: var(--brass); opacity: 0.8; }
    .chat-empty b { display: block; font-family: var(--font-display); font-size: 20px; color: var(--ink); margin-bottom: 6px; }
    .chat-empty p { font-size: 14px; max-width: 340px; margin: 0 auto; }

    .chat-ui { display: flex; flex-direction: column; flex: 1; min-height: 0; }
    .chat-ui[hidden], .chat-empty[hidden] { display: none; }

    .chat-head {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 16px; border-bottom: 1px solid var(--line);
    }
    .chat-back { display: none; }
    .chat-ava {
      width: 42px; height: 42px; flex-shrink: 0; border-radius: 11px;
      display: grid; place-items: center;
      background: linear-gradient(180deg, #E4C173, #C79A3E); color: #1b1408;
      box-shadow: 0 4px 12px var(--glow-brass-2);
    }
    .chat-ava svg { width: 26px; height: 26px; }
    .chat-who { min-width: 0; }
    .chat-who b {
      display: block; font-family: var(--font-display); font-size: 15px; font-weight: 600;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .chat-status { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--sage); font-weight: 600; }
    .chat-status i {
      width: 7px; height: 7px; border-radius: 50%; background: var(--sage);
      box-shadow: 0 0 8px var(--sage-soft);
    }
    .chat-prop {
      margin-left: auto; display: inline-flex; align-items: center; gap: 7px;
      padding: 8px 13px; border-radius: 10px; border: 1px solid var(--line);
      background: var(--surface-2); font-size: 12.5px; font-weight: 600; color: var(--ink-2);
      max-width: 46%; transition: border-color 0.2s var(--ease), color 0.2s var(--ease);
    }
    [data-theme="dark"] .chat-prop { background: rgba(255, 255, 255, 0.04); border-color: rgba(255, 255, 255, 0.10); }
    .chat-prop:hover, .chat-prop:focus-visible { border-color: var(--brass); color: var(--ink); }
    .chat-prop svg { width: 15px; height: 15px; flex-shrink: 0; color: var(--brass); }
    .chat-prop span { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* thread */
    .thread {
      flex: 1; min-height: 0; overflow-y: auto;
      padding: 20px 18px; display: flex; flex-direction: column; gap: 10px;
    }
    .thread-note {
      align-self: center; text-align: center; max-width: 380px;
      font-size: 13px; color: var(--ink-3); padding: 10px 0 4px;
    }
    .day-sep {
      align-self: center; margin: 8px 0 4px;
      font-size: 11px; font-weight: 650; letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--ink-3); padding: 5px 12px; border-radius: 8px;
      border: 1px solid var(--line); background: var(--surface-2);
    }
    [data-theme="dark"] .day-sep { background: rgba(255, 255, 255, 0.04); border-color: rgba(255, 255, 255, 0.09); }
    .msg { max-width: min(78%, 560px); display: flex; flex-direction: column; gap: 3px; }
    .msg .bubble {
      padding: 10px 14px; border-radius: 14px;
      font-size: 14.5px; line-height: 1.5;
      white-space: pre-wrap; overflow-wrap: break-word; word-break: break-word;
    }
    .msg time { font-size: 11px; color: var(--ink-3); padding: 0 4px; font-variant-numeric: tabular-nums; }
    .msg-user { align-self: flex-end; align-items: flex-end; }
    .msg-user .bubble {
      background: linear-gradient(180deg, #E4C173, #C79A3E); color: #1b1408;
      border-bottom-right-radius: 6px;
      box-shadow: 0 4px 14px var(--glow-brass-2);
    }
    .msg-mgr { align-self: flex-start; align-items: flex-start; }
    .msg-mgr .bubble {
      background: var(--surface-2); border: 1px solid var(--line);
      border-bottom-left-radius: 6px;
    }
    [data-theme="dark"] .msg-mgr .bubble {
      background: rgba(255, 255, 255, 0.05); border-color: rgba(255, 255, 255, 0.10);
      -webkit-backdrop-filter: blur(10px); backdrop-filter: blur(10px);
    }
    .typing { display: inline-flex; gap: 5px; align-items: center; min-height: 21px; }
    .typing i {
      width: 6px; height: 6px; border-radius: 50%; background: var(--ink-3);
      animation: typing-bounce 1.1s ease-in-out infinite;
    }
    .typing i:nth-child(2) { animation-delay: 0.15s; }
    .typing i:nth-child(3) { animation-delay: 0.3s; }
    @keyframes typing-bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
      30% { transform: translateY(-4px); opacity: 1; }
    }

    /* composer */
    .composer {
      display: flex; align-items: flex-end; gap: 10px;
      padding: 12px 14px; border-top: 1px solid var(--line);
    }
    .composer textarea {
      flex: 1; resize: none; min-height: 44px; max-height: 118px;
      padding: 11px 14px; border-radius: 12px; line-height: 1.45;
      border: 1px solid var(--line); background: var(--surface); color: var(--ink);
      transition: border-color 0.2s var(--ease), box-shadow 0.2s var(--ease);
    }
    [data-theme="dark"] .composer textarea { background: rgba(255, 255, 255, 0.05); border-color: rgba(255, 255, 255, 0.10); }
    .composer textarea:focus { outline: none; border-color: var(--brass); box-shadow: 0 0 0 3px var(--brass-soft); }
    .send-btn {
      min-width: 46px; min-height: 44px; flex-shrink: 0;
      display: grid; place-items: center; border-radius: 12px;
      background: linear-gradient(180deg, #E4C173, #C79A3E); color: #1b1408;
      box-shadow: 0 4px 14px var(--glow-brass-2);
      transition: transform 0.2s var(--ease), box-shadow 0.25s var(--ease);
    }
    .send-btn:hover, .send-btn:focus-visible {
      transform: translateY(-1px);
      box-shadow: 0 8px 22px var(--glow-brass-1), 0 0 34px var(--glow-brass-2);
    }
    .send-btn svg { width: 20px; height: 20px; }

    /* ================= responsive ================= */
    @media (max-width: 899px) {
      .msg-shell {
        grid-template-columns: 1fr; gap: 0; padding: 12px 0 0;
        width: min(1240px, 100% - 24px);
        height: calc(100dvh - var(--nav-h) - 96px - env(safe-area-inset-bottom, 0px));
      }
      .chat { display: none; }
      .msg-shell.show-chat .chat { display: flex; }
      .msg-shell.show-chat .msg-list { display: none; }
      .chat-back { display: inline-flex; min-width: 38px; min-height: 38px; }
      .chat-prop span { max-width: 120px; }
      .msg { max-width: 86%; }
    }
    @media (max-width: 480px) {
      .thread { padding: 16px 12px; }
      .composer { padding: 10px; }
      .ml-head { padding: 14px 12px 12px; }
      .convo-list { padding: 8px; }
    }
  </style>
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>
  <main id="main">
    <div class="msg-shell" id="msg-shell">

      <section class="msg-list glass" aria-label="Conversations">
        <header class="ml-head">
          <h1>Messages</h1>
          <button class="btn btn-brass btn-sm" id="new-msg" type="button">New message</button>
        </header>
        <ul class="convo-list" id="convo-list"></ul>
      </section>

      <section class="chat glass" aria-label="Chat with the Havnora Property Manager">
        <div class="chat-empty" id="chat-empty" hidden>
          <div>
            <span id="chat-empty-mark" aria-hidden="true"></span>
            <b>Your messages live here</b>
            <p>Pick a conversation on the left, or message the Havnora Property Manager from any listing.</p>
          </div>
        </div>

        <div class="chat-ui" id="chat-ui" hidden>
          <header class="chat-head">
            <button class="btn btn-icon btn-ghost chat-back" id="chat-back" type="button" aria-label="Back to conversations">
              <svg viewBox="0 0 24 24" width="19" height="19" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M15 5l-7 7 7 7"/></svg>
            </button>
            <span class="chat-ava" id="chat-ava" aria-hidden="true"></span>
            <div class="chat-who">
              <b>Havnora Property Manager</b>
              <span class="chat-status"><i aria-hidden="true"></i>Online</span>
            </div>
            <span id="chat-prop-slot" style="margin-left:auto; display:contents"></span>
          </header>

          <div class="thread" id="thread" role="log" aria-live="polite" aria-label="Message thread" tabindex="0"></div>

          <form class="composer" id="composer">
            <label class="sr-only" for="msg-input">Write a message</label>
            <textarea id="msg-input" rows="1" placeholder="Write a message" autocomplete="off"></textarea>
            <button class="send-btn" type="submit" aria-label="Send message">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 11.5 20 4l-4.5 16-4-6.5z"/><path d="M11.5 13.5 20 4"/></svg>
            </button>
          </form>
        </div>
      </section>

    </div>
  </main>

  <script src="assets/js/data.js"></script>
  <script src="assets/js/app.js"></script>
  <script src="assets/js/help.js"></script>
  <script src="assets/js/hv-api.js"></script>
  <script src="assets/js/messages.js"></script>
</body>
</html>
