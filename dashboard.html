<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dashboard · Solhaven</title>
  <meta name="description" content="Your Solhaven workspace: saved homes and searches for buyers, listing performance for sellers, pipeline for agents, and platform tools for admins." />
  <link rel="icon" type="image/svg+xml" href="assets/img/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400..640&family=Inter:wght@400..700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/main.css" />
  <style>
    /* ---------- aurora backdrop ---------- */
    .dash-aurora { position: fixed; inset: 0; z-index: -1; overflow: hidden; pointer-events: none; }
    .dash-aurora i {
      position: absolute; width: 46vw; height: 46vw; min-width: 420px; min-height: 420px;
      border-radius: 50%; filter: blur(80px);
      animation: aurora-drift 46s var(--ease) infinite alternate;
    }
    .dash-aurora .g1 { top: -18%; left: -10%; background: radial-gradient(circle, rgba(140, 110, 220, 0.15), transparent 70%); }
    .dash-aurora .g2 { top: 28%; right: -16%; background: radial-gradient(circle, rgba(64, 150, 140, 0.13), transparent 70%); animation-delay: -16s; animation-duration: 54s; }
    .dash-aurora .g3 { bottom: -22%; left: 24%; background: radial-gradient(circle, rgba(179, 131, 62, 0.13), transparent 70%); animation-delay: -30s; animation-duration: 62s; }
    [data-theme="dark"] .dash-aurora .g1 { background: radial-gradient(circle, rgba(124, 92, 255, 0.2), transparent 70%); }
    [data-theme="dark"] .dash-aurora .g2 { background: radial-gradient(circle, rgba(45, 212, 191, 0.13), transparent 70%); }
    [data-theme="dark"] .dash-aurora .g3 { background: radial-gradient(circle, rgba(217, 174, 99, 0.16), transparent 70%); }
    @keyframes aurora-drift {
      from { transform: translate3d(0, 0, 0) scale(1); }
      to { transform: translate3d(6vw, 4vh, 0) scale(1.12); }
    }
    @media (prefers-reduced-motion: reduce) { .dash-aurora i { animation: none; } }

    /* ---------- glass panels ---------- */
    .dash-layout .card.glass {
      border-radius: var(--r-lg);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.35), var(--shadow-1);
      transition: transform 0.45s var(--ease), box-shadow 0.45s var(--ease), border-color 0.45s var(--ease);
    }
    [data-theme="dark"] .dash-layout .card.glass {
      border-color: rgba(255, 255, 255, 0.09);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.07), var(--shadow-1);
    }
    .dash-layout .card.glass:hover {
      transform: translateY(-2px);
      border-color: var(--brass);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.18), 0 14px 40px var(--brass-soft), var(--shadow-1);
    }

    /* ---------- role rail ---------- */
    .dash-nav.card { padding: 12px; }
    .dash-nav button { border-radius: 12px; }
    .dash-nav button[aria-pressed="true"] { box-shadow: 0 0 0 1px var(--brass-soft), 0 8px 26px var(--brass-soft); }
    [data-theme="dark"] .dash-nav button[aria-pressed="true"] { background: var(--brass); color: #14100a; }

    /* ---------- view switch: 150ms out, 250ms back in ---------- */
    #dash-content { transition: opacity 0.25s var(--ease), transform 0.25s var(--ease); }
    #dash-content.is-switching { opacity: 0; transform: translateY(12px); transition-duration: 0.15s; }

    /* ---------- welcome strip ---------- */
    .welcome-strip {
      display: flex; align-items: center; justify-content: space-between; gap: 14px; flex-wrap: wrap;
      padding: 14px 20px; margin-bottom: 18px; border-radius: var(--r-lg);
    }
    .welcome-strip p { margin: 0; font-size: 15px; }
    .welcome-strip b { font-family: var(--font-display); font-weight: 600; font-size: 17px; }
    .welcome-strip .muted { font-size: 14px; }
    .welcome-who { max-width: 46ch; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* ---------- page pieces ---------- */
    .dash-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 14px; margin-bottom: 24px; }
    .dash-head h1 { font-size: clamp(26px, 3vw, 34px); margin-bottom: 4px; }
    .dash-head p { margin: 0; font-size: 14.5px; }
    .kpi .delta { display: inline; margin-left: 6px; }
    .panel-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; align-items: start; }
    .card-head { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 14px; flex-wrap: wrap; }
    .card-head h3 { margin: 0; font-size: 19px; }
    .dash-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 18px; }
    .stack-card { margin-bottom: 20px; }

    .ss-item, .lead-row { display: flex; justify-content: space-between; align-items: center; gap: 14px; padding: 13px 0; border-bottom: 1px dashed var(--line); }
    .ss-item:first-of-type, .lead-row:first-of-type { padding-top: 4px; }
    .ss-item:last-of-type, .lead-row:last-of-type { border-bottom: none; padding-bottom: 2px; }
    .ss-item b, .lead-row b { font-size: 14.5px; }
    .ss-item .small, .lead-row .small { display: block; margin-top: 2px; }
    .ss-item .badge { margin-left: 8px; vertical-align: 1px; }

    .audit-list { list-style: none; margin: 0; padding: 0; }
    .audit-list li { display: flex; gap: 14px; align-items: baseline; padding: 9px 0; border-bottom: 1px dashed var(--line); font-size: 14px; color: var(--ink-2); }
    .audit-list li:last-child { border-bottom: none; }
    .audit-list .num { color: var(--ink-3); font-size: 12.5px; flex-shrink: 0; }

    .recent-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
    .recent-card { display: block; border-radius: var(--r-md); }
    .recent-card .thumb { display: grid; place-items: center; aspect-ratio: 16 / 10; border-radius: var(--r-md); margin-bottom: 8px; transition: transform 0.35s var(--ease); }
    .recent-card:hover .thumb { transform: translateY(-2px); }
    .recent-card .thumb svg { width: 30px; height: 30px; opacity: 0.55; color: #fff; }
    .recent-card b { display: block; font-size: 15px; }

    .who { display: flex; align-items: center; gap: 10px; }
    .mini-avatar { width: 34px; height: 34px; font-size: 12.5px; }

    /* small glass help trigger (shared look, kept in sync with main.css) */
    .help-btn {
      width: 30px; height: 30px; min-width: 30px; flex-shrink: 0; border-radius: 8px;
      border: 1px solid var(--line); background: var(--glass);
      -webkit-backdrop-filter: blur(10px); backdrop-filter: blur(10px);
      font-size: 14px; font-weight: 650; color: var(--ink-2);
      display: inline-grid; place-items: center;
      transition: color 0.2s, border-color 0.2s, box-shadow 0.35s var(--ease);
    }
    .help-btn:hover { color: var(--brass); border-color: var(--brass); box-shadow: 0 0 0 4px var(--brass-soft); }

    @media (max-width: 900px) {
      .panel-grid { grid-template-columns: 1fr; }
      .recent-row { grid-template-columns: repeat(2, 1fr); }
      .dash-nav.card { border-radius: 16px; }
    }
  </style>
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>
  <div class="dash-aurora" aria-hidden="true"><i class="g1"></i><i class="g2"></i><i class="g3"></i></div>

  <main id="main">
    <div class="wrap dash-layout">
      <aside class="dash-nav card glass" id="dash-nav" aria-label="Dashboard views">
        <button type="button" data-role="buyer" aria-pressed="false">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 20s-7-4.4-9.3-8.6C1.1 8.3 3 5 6.4 5c2 0 3.4 1.1 4.1 2.3h3c.7-1.2 2.1-2.3 4.1-2.3 3.4 0 5.3 3.3 3.7 6.4C19 15.6 12 20 12 20z"/></svg>
          Buyer
        </button>
        <button type="button" data-role="seller" aria-pressed="false">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20.6 13.4 12 4.8H4.8V12l8.6 8.6a1.8 1.8 0 0 0 2.5 0l4.7-4.7a1.8 1.8 0 0 0 0-2.5z"/><circle cx="8.6" cy="8.6" r="1.4"/></svg>
          Seller
        </button>
        <button type="button" data-role="agent" aria-pressed="false">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3.5" y="7.5" width="17" height="12" rx="2.5"/><path d="M9 7.5V5.6A1.6 1.6 0 0 1 10.6 4h2.8A1.6 1.6 0 0 1 15 5.6v1.9M3.5 12.5h17"/></svg>
          Agent
        </button>
        <button type="button" data-role="admin" aria-pressed="false">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 3.5 5 6.2v5.3c0 4.4 3 7.5 7 9 4-1.5 7-4.6 7-9V6.2z"/><path d="m9.2 12 2 2 3.6-3.8"/></svg>
          Admin
        </button>
      </aside>

      <section id="dash-content" aria-label="Dashboard content"></section>
    </div>
  </main>

  <script src="assets/js/data.js"></script>
  <script src="assets/js/app.js"></script>
  <script src="assets/js/help.js"></script>
  <script src="assets/js/dashboard.js"></script>
</body>
</html>
