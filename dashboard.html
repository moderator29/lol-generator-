<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dashboard · Havnora</title>
  <meta name="description" content="Your Havnora haven: saved homes, viewings, conversations, payments, and market analytics in one calm black and gold workspace." />
  <link rel="icon" type="image/svg+xml" href="assets/img/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Inter:wght@400..700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/main.css" />
  <style>
    /* ================= dashboard shell ================= */
    .dash-shell {
      width: min(1440px, 100% - 40px); margin-inline: auto;
      display: grid; grid-template-columns: 240px minmax(0, 1fr) 376px;
      gap: 22px; align-items: start; padding: 26px 0 84px;
    }
    .dash-shell > * { min-width: 0; }

    /* ================= left sidebar ================= */
    .dash-side {
      position: sticky; top: calc(var(--nav-h) + 18px);
      display: flex; flex-direction: column;
      padding: 16px 12px; border-radius: var(--r-lg);
      max-height: calc(100vh - var(--nav-h) - 36px); overflow-y: auto;
    }
    .side-logo {
      display: flex; align-items: center; gap: 10px; padding: 6px 10px 18px;
      font-family: var(--font-display); font-size: 13.5px; font-weight: 500; letter-spacing: 0.22em;
    }
    .side-logo svg { width: 28px; height: 28px; color: var(--brass); }
    .snav { display: flex; flex-direction: column; gap: 4px; }
    .sn-item {
      display: flex; align-items: center; gap: 12px; width: 100%;
      padding: 11px 13px; border-radius: 11px; text-align: left;
      font-size: 14px; font-weight: 560; color: var(--ink-2);
      transition: background-color 0.25s var(--ease), color 0.25s var(--ease), box-shadow 0.3s var(--ease);
    }
    .sn-item svg { width: 18px; height: 18px; flex-shrink: 0; }
    .sn-item:hover { background: var(--surface-2); color: var(--ink); }
    [data-theme="dark"] .sn-item:hover { background: rgba(255, 255, 255, 0.05); }
    .sn-item.is-active, .sn-item.is-active:hover {
      background: linear-gradient(180deg, #E4C173, #C79A3E); color: #1b1408;
      box-shadow: 0 6px 16px var(--glow-brass-1), 0 0 30px var(--glow-brass-2);
    }
    .side-user {
      margin-top: auto; padding-top: 16px; border-top: 1px solid var(--line);
      display: flex; flex-direction: column; gap: 10px;
    }
    .side-who { display: flex; align-items: center; gap: 10px; min-width: 0; }
    .side-ava {
      width: 38px; height: 38px; border-radius: 10px; flex-shrink: 0;
      display: grid; place-items: center; font-weight: 700; font-size: 13px;
      background: linear-gradient(180deg, #E4C173, #C79A3E); color: #1b1408;
      box-shadow: 0 4px 12px var(--glow-brass-2);
    }
    .side-who > div { min-width: 0; }
    .side-who b { display: block; font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .side-who span { display: block; font-size: 10.5px; color: var(--brass); font-weight: 650; letter-spacing: 0.1em; text-transform: uppercase; }

    /* ================= main column ================= */
    #dash-main { transition: opacity 0.25s var(--ease), transform 0.25s var(--ease); }
    #dash-main.is-switching { opacity: 0; transform: translateY(10px); transition-duration: 0.15s; }
    .dv { animation: fade-up 0.5s var(--ease) both; }

    .greet-card {
      display: flex; justify-content: space-between; align-items: center; gap: 16px; flex-wrap: wrap;
      padding: 24px 26px; border-radius: var(--r-lg); margin-bottom: 18px;
    }
    .greet-card h1 { font-size: clamp(22px, 2.6vw, 30px); margin: 0 0 4px; }
    .greet-card p { margin: 0; font-size: 14.5px; }
    .greet-date {
      font-size: 13px; font-weight: 600; color: var(--ink-2); padding: 9px 14px;
      border: 1px solid var(--line); border-radius: 10px; background: var(--surface-2);
    }
    [data-theme="dark"] .greet-date { background: rgba(255, 255, 255, 0.04); border-color: rgba(255, 255, 255, 0.10); }

    .dkpi-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 18px; }
    .dkpi { padding: 18px; border-radius: var(--r-md); }
    .dkpi-top { display: flex; justify-content: space-between; align-items: center; gap: 8px; margin-bottom: 10px; }
    .dkpi-top span { font-size: 12.5px; color: var(--ink-2); }
    .dkpi-ico {
      width: 32px; height: 32px; border-radius: 9px; display: grid; place-items: center;
      background: var(--brass-soft); color: var(--brass); flex-shrink: 0;
    }
    .dkpi-ico svg { width: 16px; height: 16px; }
    .dkpi b { font-family: var(--font-display); font-size: 27px; font-weight: 600; line-height: 1; }
    .dkpi .delta {
      display: inline-flex; align-items: center; gap: 3px; margin-left: 8px;
      font-size: 12px; font-weight: 650; color: var(--brass);
    }
    .dkpi .delta svg { width: 11px; height: 11px; }

    .panel-row { display: grid; grid-template-columns: 1.55fr 1fr; gap: 18px; margin-bottom: 18px; align-items: stretch; }
    .panel-row > * { min-width: 0; }
    .card-head { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
    .card-head h2 { font-size: 18px; margin: 0; }
    .card-head .sub { font-size: 13px; margin: 2px 0 0; }
    .chart-wrap { overflow-x: auto; }
    .chart-svg { width: 100%; height: auto; display: block; min-width: 420px; }
    .chart-key { display: flex; gap: 16px; font-size: 12px; color: var(--ink-3); margin-top: 8px; }
    .chart-key i { display: inline-block; width: 14px; height: 3px; border-radius: 2px; margin-right: 6px; vertical-align: middle; }

    .fpill {
      min-height: 40px; padding: 0 14px; border-radius: 10px;
      border: 1px solid var(--line); background: var(--glass); color: var(--ink);
      -webkit-backdrop-filter: blur(10px); backdrop-filter: blur(10px);
      font-size: 13.5px; font-weight: 560;
      transition: border-color 0.2s var(--ease), box-shadow 0.25s var(--ease);
    }
    [data-theme="dark"] .fpill { background: rgba(255, 255, 255, 0.05); border-color: rgba(255, 255, 255, 0.12); }
    .fpill:hover, .fpill:focus-visible { border-color: var(--brass); }
    .fpill[aria-pressed="true"] {
      background: linear-gradient(180deg, #E4C173, #C79A3E); color: #1b1408; border-color: transparent;
      box-shadow: 0 4px 14px var(--glow-brass-2);
    }
    .filter-row { display: flex; gap: 10px; flex-wrap: wrap; margin: 16px 0 20px; }

    .loc-row { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px dashed var(--line); }
    .loc-row:last-child { border-bottom: none; padding-bottom: 2px; }
    .loc-ico {
      width: 34px; height: 34px; border-radius: 9px; flex-shrink: 0;
      display: grid; place-items: center; background: var(--brass-soft); color: var(--brass);
    }
    .loc-ico svg { width: 16px; height: 16px; }
    .loc-row > div { flex: 1; min-width: 0; }
    .loc-row b { font-size: 14px; font-weight: 600; }
    .loc-row .small { color: var(--ink-3); }
    .loc-bar { height: 5px; border-radius: 4px; background: var(--surface-2); overflow: hidden; margin-top: 6px; }
    [data-theme="dark"] .loc-bar { background: rgba(255, 255, 255, 0.07); }
    .loc-bar i { display: block; height: 100%; border-radius: 4px; background: linear-gradient(90deg, #E4C173, #C79A3E); }

    .bk-row { display: flex; align-items: center; gap: 12px; padding: 11px 0; border-bottom: 1px dashed var(--line); }
    .bk-row:last-child { border-bottom: none; }
    .bk-thumb { width: 58px; height: 44px; border-radius: 9px; overflow: hidden; position: relative; flex-shrink: 0; }
    .bk-thumb img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
    .bk-row > div { flex: 1; min-width: 0; }
    .bk-row b { display: block; font-size: 13.5px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .bk-row .small { color: var(--ink-3); }

    .dash-main .property-grid { grid-template-columns: repeat(2, 1fr); gap: 20px; }
    .view-head h1 { font-size: clamp(24px, 2.8vw, 32px); margin-bottom: 4px; }
    .view-head p { margin: 0; font-size: 14.5px; }

    .tabrow {
      display: inline-flex; gap: 4px; padding: 4px; margin-bottom: 16px;
      border: 1px solid var(--line); border-radius: 12px; background: var(--glass);
      -webkit-backdrop-filter: blur(10px); backdrop-filter: blur(10px);
    }
    [data-theme="dark"] .tabrow { background: rgba(255, 255, 255, 0.04); border-color: rgba(255, 255, 255, 0.12); }
    .tabrow button { min-height: 36px; padding: 0 16px; border-radius: 9px; font-size: 13.5px; font-weight: 600; color: var(--ink-2); transition: background-color 0.3s var(--ease), color 0.3s var(--ease); }
    .tabrow button[aria-pressed="true"] { background: linear-gradient(180deg, #E4C173, #C79A3E); color: #1b1408; box-shadow: 0 3px 12px var(--glow-brass-2); }

    .payx { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 18px; }
    .payx-card { border-radius: var(--r-md); padding: 24px; border: 1px solid var(--line); }
    .payx-card .kicker { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; opacity: 0.75; }
    .payx-card .big { font-family: var(--font-display); font-size: 28px; font-weight: 600; display: block; margin: 6px 0 2px; }
    .payx-card.plain .big { color: var(--brass); }
    .payx-card.gold {
      background: linear-gradient(180deg, #E4C173, #C79A3E); color: #1b1408; border-color: transparent;
      box-shadow: 0 10px 30px var(--glow-brass-2);
    }
    .payx-list { list-style: none; margin: 14px 0 0; padding: 0; display: grid; gap: 8px; font-size: 13.5px; }
    .payx-list li { display: flex; gap: 8px; align-items: baseline; }
    .payx-list svg { width: 13px; height: 13px; flex-shrink: 0; transform: translateY(2px); color: var(--brass); }
    .payx-card.gold .payx-list svg { color: #1b1408; }

    .set-row {
      display: flex; justify-content: space-between; align-items: center; gap: 16px;
      padding: 14px 0; border-bottom: 1px dashed var(--line); flex-wrap: wrap;
    }
    .set-row:last-child { border-bottom: none; }
    .set-row b { font-size: 14.5px; font-weight: 600; display: block; }
    .set-row .small { color: var(--ink-3); }

    .stack-card { margin-bottom: 18px; }

    /* ================= right details panel ================= */
    .dash-details {
      position: sticky; top: calc(var(--nav-h) + 18px);
      padding: 18px; border-radius: var(--r-lg);
      max-height: calc(100vh - var(--nav-h) - 36px); overflow-y: auto;
    }
    .dp-top { display: flex; justify-content: space-between; align-items: center; gap: 10px; margin-bottom: 12px; }
    .dp-top h2 { font-size: 16px; margin: 0; }
    .dp-back { font-size: 12.5px; font-weight: 600; color: var(--ink-3); display: inline-flex; align-items: center; gap: 5px; border-radius: 8px; padding: 5px 8px; transition: color 0.2s; }
    .dp-back:hover { color: var(--brass); }
    .dp-back svg { width: 13px; height: 13px; }
    .dp-hero { position: relative; aspect-ratio: 16 / 10; border-radius: 14px; overflow: hidden; margin-bottom: 8px; }
    .dp-hero img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
    .dp-hero .badge { position: absolute; top: 10px; left: 10px; }
    .dp-hero-label {
      position: absolute; bottom: 10px; right: 10px; font-size: 11px; font-weight: 600;
      padding: 4px 9px; border-radius: 7px; background: rgba(10, 12, 16, 0.6); color: #fff;
    }
    .dp-thumbs { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; margin-bottom: 14px; }
    .dp-thumbs button {
      position: relative; aspect-ratio: 4 / 3; border-radius: 8px; overflow: hidden;
      opacity: 0.68; outline: 2px solid transparent; outline-offset: 1px;
      transition: opacity 0.2s, outline-color 0.2s;
    }
    .dp-thumbs button:hover, .dp-thumbs button.is-active { opacity: 1; }
    .dp-thumbs button.is-active { outline-color: var(--brass); }
    .dp-thumbs img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
    .dp-addr b { display: block; font-size: 16px; font-family: var(--font-display); font-weight: 600; }
    .dp-addr span { font-size: 13px; color: var(--ink-2); }
    .dp-price { font-family: var(--font-display); font-size: 27px; font-weight: 600; color: var(--brass); margin-top: 6px; }
    .dp-price .per { font-family: var(--font-ui); font-size: 12px; font-weight: 500; color: var(--ink-3); margin-left: 8px; }
    .dp-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin: 14px 0 4px; }
    .dp-stat {
      border: 1px solid var(--line); border-radius: 10px; padding: 10px 4px; text-align: center;
      background: var(--surface-2);
    }
    [data-theme="dark"] .dp-stat { background: rgba(255, 255, 255, 0.04); border-color: rgba(255, 255, 255, 0.09); }
    .dp-stat b { display: block; font-size: 15px; font-weight: 650; }
    .dp-stat span { font-size: 10px; color: var(--ink-3); text-transform: uppercase; letter-spacing: 0.05em; }
    .dp-h { font-size: 12px; letter-spacing: 0.09em; text-transform: uppercase; color: var(--ink-3); font-weight: 650; margin: 16px 0 8px; }
    .dp-feats { display: grid; grid-template-columns: 1fr 1fr; gap: 7px 12px; margin: 0 0 4px; padding: 0; list-style: none; font-size: 13px; color: var(--ink-2); }
    .dp-feats li { display: flex; gap: 7px; align-items: baseline; }
    .dp-feats svg { width: 13px; height: 13px; color: var(--brass); flex-shrink: 0; transform: translateY(2px); }
    .dp-cta { display: grid; gap: 10px; margin-top: 18px; }

    .dash-shell .empty { padding: 52px 20px; }

    /* ================= responsive ================= */
    @media (max-width: 1200px) {
      .dash-shell { grid-template-columns: 224px minmax(0, 1fr); }
      .dash-details { display: none; }
    }
    @media (max-width: 900px) {
      .dash-shell { grid-template-columns: 1fr; gap: 16px; padding-top: 14px; }
      .dash-side {
        position: static; flex-direction: row; align-items: center; gap: 8px;
        max-height: none; padding: 10px; overflow-x: auto; overflow-y: hidden;
      }
      .side-logo { display: none; }
      .snav { flex-direction: row; gap: 6px; }
      .sn-item { white-space: nowrap; padding: 9px 13px; }
      .side-user { margin: 0 0 0 auto; padding: 0 0 0 12px; border-top: none; border-left: 1px solid var(--line); flex-direction: row; align-items: center; }
      .side-user .btn { display: none; }
      .side-who b { max-width: 130px; }
      .side-who span { display: none; }
      .panel-row { grid-template-columns: 1fr; }
    }
    @media (max-width: 680px) {
      .dkpi-row { grid-template-columns: repeat(2, 1fr); }
      .dash-main .property-grid { grid-template-columns: 1fr; }
      .payx { grid-template-columns: 1fr; }
      .greet-card { padding: 20px; }
      .tabrow { width: 100%; }
      .tabrow button { flex: 1; padding: 0 8px; }
    }
    @media (prefers-reduced-motion: reduce) {
      .dv { animation: none; }
      #dash-main, #dash-main.is-switching { transition: none; opacity: 1; transform: none; }
    }
  </style>
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>

  <main id="main">
    <div class="dash-shell">
      <aside class="dash-side glass card" id="dash-side" aria-label="Dashboard navigation"></aside>
      <section class="dash-main" id="dash-main" aria-live="polite"></section>
      <aside class="dash-details glass card" id="dash-details" aria-label="Property details"></aside>
    </div>
  </main>

  <script src="assets/js/data.js"></script>
  <script src="assets/js/app.js"></script>
  <script src="assets/js/help.js"></script>
  <script src="assets/js/hv-api.js"></script>
  <script src="assets/js/dashboard.js"></script>
</body>
</html>
