<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Search homes · Havnora</title>
  <meta name="description" content="Search homes for sale across America with fast, honest filters: price, beds, baths, type, lot size, pools, school districts, and more." />
  <link rel="icon" type="image/svg+xml" href="assets/img/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Inter:wght@400..700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/main.css" />
  <style>
    /* search page polish (page-scoped) */
    .search-page { padding: 28px 0 72px; }
    .title-row { display: flex; align-items: center; gap: 10px; }
    .title-row .help-btn { margin-top: 2px; }

    .map-head { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }

    /* ---------- top filter bar ---------- */
    .filterbar {
      display: flex; flex-wrap: wrap; align-items: center; gap: 10px;
      margin: 0 0 18px;
    }
    .fb-select { position: relative; display: inline-flex; }
    .fb-select select {
      appearance: none; -webkit-appearance: none;
      height: 42px; padding: 0 36px 0 16px; min-width: 132px;
      border-radius: 10px; border: 1px solid var(--line);
      background: var(--surface); color: var(--ink);
      font: 500 14px/1.2 var(--font-ui); cursor: pointer;
      box-shadow: var(--shadow-1);
      transition: border-color 0.2s var(--ease), box-shadow 0.2s var(--ease);
    }
    .fb-select::after {
      content: ""; position: absolute; right: 15px; top: 50%;
      width: 7px; height: 7px; margin-top: -5px;
      border-right: 1.5px solid var(--ink-3); border-bottom: 1.5px solid var(--ink-3);
      transform: rotate(45deg); pointer-events: none;
    }
    .fb-select select:hover { border-color: var(--brass); }
    .fb-select select:focus-visible { outline: 2px solid var(--brass); outline-offset: 2px; }
    .fb-select select.is-set { border-color: var(--brass); color: var(--brass-strong); }
    [data-theme="dark"] .fb-select select {
      background: rgba(21, 29, 41, 0.58);
      border-color: rgba(255, 255, 255, 0.10);
      -webkit-backdrop-filter: blur(10px); backdrop-filter: blur(10px);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06);
    }
    [data-theme="dark"] .fb-select select.is-set { border-color: rgba(217, 174, 99, 0.55); color: var(--brass); }
    .fb-more { height: 42px; border-radius: 10px; gap: 8px; }
    .fb-more svg { width: 16px; height: 16px; }

    .fb-view {
      display: flex; margin-left: auto; overflow: hidden;
      border: 1px solid var(--line); border-radius: 10px;
      background: var(--surface); box-shadow: var(--shadow-1);
    }
    [data-theme="dark"] .fb-view {
      background: rgba(21, 29, 41, 0.58);
      border-color: rgba(255, 255, 255, 0.10);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06);
    }
    .fb-view button {
      width: 44px; height: 40px; display: grid; place-items: center;
      color: var(--ink-3); transition: background-color 0.2s var(--ease), color 0.2s var(--ease);
    }
    .fb-view button + button { border-left: 1px solid var(--line); }
    [data-theme="dark"] .fb-view button + button { border-left-color: rgba(255, 255, 255, 0.10); }
    .fb-view button:hover { color: var(--ink); }
    .fb-view button[aria-pressed="true"] { background: var(--brass-soft); color: var(--brass-strong); }
    [data-theme="dark"] .fb-view button[aria-pressed="true"] { color: var(--brass); }
    .fb-view button:focus-visible { outline: 2px solid var(--brass); outline-offset: -2px; }
    .fb-view svg { width: 18px; height: 18px; }

    /* results span full width now: allow 3-up on wide screens */
    @media (min-width: 1400px) { .results-grid:not(.is-list) { grid-template-columns: repeat(3, 1fr); } }

    /* ---------- list view ---------- */
    .results-grid.is-list { grid-template-columns: 1fr; }
    .results-grid.is-list .property-card { flex-direction: row; }
    .results-grid.is-list .pc-media { flex: 0 0 40%; width: 40%; aspect-ratio: auto; min-height: 244px; }
    .results-grid.is-list .pc-body { flex: 1; justify-content: center; gap: 10px; }
    .results-grid.is-list .pc-addr { padding-right: 132px; }
    .results-grid.is-list .sk-card { height: 244px; }
    @media (max-width: 700px) {
      .results-grid.is-list .property-card { flex-direction: column; }
      .results-grid.is-list .pc-media { width: 100%; flex: none; aspect-ratio: 4 / 3; min-height: 0; }
      .results-grid.is-list .pc-addr { padding-right: 0; }
      .results-grid.is-list .sk-card { height: 340px; }
    }

    /* drawer becomes a right-side sheet on wide viewports */
    @media (min-width: 900px) {
      .drawer { inset: 0 0 0 auto; width: 430px; max-width: 92vw; max-height: none; border-radius: var(--r-xl) 0 0 var(--r-xl); transform: translateX(105%); }
      .drawer.is-open { transform: translateX(0); }
      .drawer-body { flex: 1; }
    }

    /* active filter chips */
    .chip-row { display: flex; flex-wrap: wrap; gap: 8px; margin: -6px 0 18px; }
    .chip-row:empty { display: none; }
    .chip-x { cursor: pointer; }
    .chip-x i {
      font-style: normal; font-size: 11px; font-weight: 700; line-height: 1;
      width: 16px; height: 16px; border-radius: 5px; display: grid; place-items: center;
      background: var(--brass-soft); color: var(--brass-strong);
      transition: background-color 0.2s var(--ease), color 0.2s var(--ease);
    }
    [data-theme="dark"] .chip-x i { color: var(--brass); }
    .chip-x:hover i { background: var(--rust-soft); color: var(--rust); }
    .chip-clear { border-style: dashed; }
    .chip-in { animation: chip-in 0.45s var(--ease) backwards; }
    @keyframes chip-in {
      from { opacity: 0; transform: translateY(6px) scale(0.96); }
      to { opacity: 1; transform: none; }
    }

    /* skeleton result placeholders */
    .sk-card { height: 340px; border-radius: var(--r-lg); border: 1px solid var(--line); }
    [data-theme="dark"] .sk-card { background: rgba(21, 29, 41, 0.58); border-color: rgba(255, 255, 255, 0.08); }

    /* map pin pop-in + cross highlight */
    .map-pin.pin-pop { animation: pin-in 0.5s var(--ease) backwards; }
    @keyframes pin-in {
      from { opacity: 0; transform: translate(-50%, -60%) scale(0.55); }
      to { opacity: 1; transform: translate(-50%, -100%) scale(1); }
    }
    .property-card.is-hot { border-color: var(--brass); box-shadow: var(--shadow-2); transform: translateY(-4px); }
    [data-theme="dark"] .property-card.is-hot {
      border-color: rgba(217, 174, 99, 0.45);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.10), 0 18px 44px rgba(0, 0, 0, 0.5), 0 0 42px rgba(217, 174, 99, 0.16);
    }

    @media (max-width: 560px) {
      .results-tools { width: 100%; flex-wrap: wrap; }
      .results-tools .field { flex: 1; min-width: 150px; }
      .results-tools .btn { padding: 0 14px; }
      .fb-select { flex: 1 1 calc(50% - 5px); }
      .fb-select select { width: 100%; min-width: 0; }
      .fb-more { flex: 1 1 auto; justify-content: center; }
      .fb-view { margin-left: 0; }
    }
    @media (prefers-reduced-motion: reduce) {
      .chip-in, .map-pin.pin-pop { animation: none; }
      .property-card.is-hot { transform: none; }
    }
  </style>
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>

  <main id="main">
    <div class="wrap search-page">
      <div class="results-head fade-up">
        <div>
          <div class="title-row">
            <h1 id="results-title">Homes for sale</h1>
            <button class="help-btn" data-help="search-filters" aria-label="How search filters work">?</button>
          </div>
          <p class="small muted num" id="results-count" aria-live="polite" style="margin:2px 0 0"></p>
        </div>
        <div class="results-tools">
          <button class="btn glass btn-glow" id="save-search">Save this search</button>
          <label class="field" style="min-width:180px">
            <select id="sort" class="input" aria-label="Sort results">
              <option value="recommended">Recommended</option>
              <option value="newest">Newest</option>
              <option value="price-asc">Price: low to high</option>
              <option value="price-desc">Price: high to low</option>
              <option value="sqft-desc">Largest</option>
              <option value="ppsf-asc">$/sqft: low to high</option>
            </select>
          </label>
          <button class="help-btn" data-help="quick-view" aria-label="How quick view works">?</button>
        </div>
      </div>

      <!-- Top filter bar -->
      <div class="filterbar fade-up" role="group" aria-label="Quick filters">
        <span class="fb-select">
          <select id="fb-type" aria-label="Property type"></select>
        </span>
        <span class="fb-select">
          <select id="fb-city" aria-label="Location"></select>
        </span>
        <span class="fb-select">
          <select id="fb-price" aria-label="Price range"></select>
        </span>
        <span class="fb-select">
          <select id="fb-beds" aria-label="Minimum bedrooms"></select>
        </span>
        <button class="btn glass fb-more" id="open-filters">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
            <line x1="4" y1="7" x2="20" y2="7"/><circle cx="9" cy="7" r="2.4" fill="var(--surface)"/>
            <line x1="4" y1="17" x2="20" y2="17"/><circle cx="15" cy="17" r="2.4" fill="var(--surface)"/>
          </svg>
          More Filters
        </button>
        <div class="fb-view" role="group" aria-label="Results layout">
          <button type="button" id="view-grid" aria-label="Grid view" aria-pressed="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
              <rect x="4" y="4" width="7" height="7" rx="1.5"/><rect x="13" y="4" width="7" height="7" rx="1.5"/>
              <rect x="4" y="13" width="7" height="7" rx="1.5"/><rect x="13" y="13" width="7" height="7" rx="1.5"/>
            </svg>
          </button>
          <button type="button" id="view-list" aria-label="List view" aria-pressed="false">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
              <rect x="4" y="4" width="6" height="6" rx="1.5"/><line x1="13" y1="6" x2="20" y2="6"/><line x1="13" y1="9" x2="18" y2="9"/>
              <rect x="4" y="14" width="6" height="6" rx="1.5"/><line x1="13" y1="16" x2="20" y2="16"/><line x1="13" y1="19" x2="18" y2="19"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="chip-row fade-up" id="filter-chips" role="group" aria-label="Active filters"></div>

      <div class="map-head fade-up">
        <span class="small muted">Map view · pins follow your filters</span>
        <button class="help-btn" data-help="map" aria-label="How the map works">?</button>
      </div>
      <div class="map-panel reveal is-in" id="map" role="group" aria-label="Map of matching homes (interactive map placeholder)" style="margin-bottom:24px; height:320px">
        <div class="map-note" id="map-note"><b>Interactive map placeholder</b><br />Reserved for MapLibre / Mapbox integration. Pins reflect live results.</div>
      </div>

      <div class="results-grid" id="results" aria-live="polite"></div>
      <div id="results-empty"></div>
    </div>
  </main>

  <!-- Filter drawer (all viewports) -->
  <div class="scrim" id="scrim" hidden></div>
  <div class="drawer" id="filter-drawer" role="dialog" aria-modal="true" aria-label="Filters" hidden>
    <div class="drawer-head">
      <b style="font-family:var(--font-display); font-size:19px">More Filters</b>
      <button class="btn btn-icon btn-ghost" id="close-filters" aria-label="Close filters">✕</button>
    </div>
    <div class="drawer-body" id="drawer-host"></div>
    <div class="drawer-foot">
      <button class="btn" id="drawer-reset" style="flex:1">Reset</button>
      <button class="btn btn-primary" id="drawer-apply" style="flex:2">Show results</button>
    </div>
  </div>

  <script src="assets/js/data.js"></script>
  <script src="assets/js/app.js"></script>
  <script src="assets/js/help.js"></script>
  <script src="assets/js/hv-api.js"></script>
  <script src="assets/js/search.js"></script>
</body>
</html>
